{{/* First-run admin setup. */}}
<div class="panel-card p-6 space-y-5">
  <div>
    <h2 class="text-lg font-bold text-foreground">Create admin account</h2>
    <p class="mt-1 text-sm text-muted-foreground">Set up your NextDeploy panel with an admin account. This is a one-time setup.</p>
  </div>

  {{if .Error}}
  <div class="flex items-start gap-2.5 rounded-lg border border-rose-500/30 bg-rose-500/10 px-3.5 py-3">
    <svg class="mt-0.5 h-4 w-4 shrink-0 text-rose-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    <p class="text-sm text-rose-300">{{.Error}}</p>
  </div>
  {{end}}

  <form method="post" action="/setup" class="space-y-4">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-foreground" for="username">Username</label>
      <input id="username" name="username" type="text" class="input w-full" placeholder="admin" required autocomplete="username" minlength="3">
      <p class="mt-1 text-xs text-muted-foreground">At least 3 characters</p>
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-foreground" for="password">Password</label>
      <input id="password" name="password" type="password" class="input w-full" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      <p class="mt-1 text-xs text-muted-foreground">At least 8 characters</p>
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-foreground" for="confirm">Confirm password</label>
      <input id="confirm" name="confirm" type="password" class="input w-full" placeholder="••••••••" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="btn-primary w-full py-2.5 text-sm">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Create account &amp; sign in
    </button>
  </form>
</div>
