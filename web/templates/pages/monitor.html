{{/* Live resource monitor; embeds partials/monitor_stats. Layout: layouts/shell. */}}
<div class="page-shell max-w-7xl">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div class="min-w-0">
      <div class="flex min-w-0 items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-500/10 ring-1 ring-emerald-500/20">
          <svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.5h3.75l1.5-6 3 12 2.25-9 1.5 3H21"/>
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="page-title">Monitor</h1>
          <p class="page-subtitle">Realtime CPU, memory, network, and container usage</p>
        </div>
      </div>
    </div>
    <div class="section-header-actions sm:items-stretch">
      <button type="button" class="btn-secondary h-11 px-3 text-xs sm:h-9" onclick="window.__monitorReconnect && window.__monitorReconnect()">
        Reconnect stream
      </button>
      <div id="monitor-live-badge" class="inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-2 text-[11px] font-medium text-emerald-300 sm:min-h-0 sm:w-auto sm:py-1.5">
        <span id="monitor-live-dot" class="inline-flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span id="monitor-live-label">Active only while open</span>
      </div>
    </div>
  </div>

  <div id="monitor-root">
    {{template "partials/monitor_stats" .}}
  </div>
</div>

<script>
(function () {
  var root = document.getElementById('monitor-root');
  var badge = document.getElementById('monitor-live-badge');
  var label = document.getElementById('monitor-live-label');
  var dot = document.getElementById('monitor-live-dot');
  var ws = null;
  var retryTimer = 0;
  var shouldReconnect = true;
  var lastPayload = null;

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getPinned() {
    try {
      return JSON.parse(localStorage.getItem('pinned_containers') || '[]');
    } catch (e) {
      return [];
    }
  }

  function savePinned(arr) {
    localStorage.setItem('pinned_containers', JSON.stringify(arr));
  }

  window.togglePin = function(name) {
    var pinned = getPinned();
    var idx = pinned.indexOf(name);
    if (idx >= 0) {
      pinned.splice(idx, 1);
      savePinned(pinned);
    } else {
      if (pinned.length >= 3) {
        alert("You can only pin up to 3 containers.");
        return;
      }
      pinned.push(name);
      savePinned(pinned);
    }
    if (lastPayload) {
      renderMonitor(lastPayload);
    } else {
      triggerSort();
    }
  };

  function triggerSort() {
    var tbody = document.querySelector('#monitor-root tbody');
    if (!tbody) return;
    var rows = Array.from(tbody.querySelectorAll('.container-row'));
    if (rows.length === 0) return;
    
    var pinned = getPinned();
    
    rows.forEach(function (row) {
      var name = row.getAttribute('data-name');
      var isPinned = pinned.indexOf(name) >= 0;
      var svg = row.querySelector('.pin-icon');
      if (svg) {
        if (isPinned) {
          svg.setAttribute('class', 'h-3.5 w-3.5 text-primary rotate-45 shrink-0 transform transition-transform pin-icon');
          svg.setAttribute('fill', 'currentColor');
        } else {
          svg.setAttribute('class', 'h-3.5 w-3.5 text-muted-foreground/30 hover:text-primary hover:scale-110 shrink-0 transform transition-all pin-icon');
          svg.setAttribute('fill', 'none');
        }
      }
    });

    rows.sort(function (a, b) {
      var nameA = a.getAttribute('data-name');
      var nameB = b.getAttribute('data-name');
      var pinA = pinned.indexOf(nameA) >= 0;
      var pinB = pinned.indexOf(nameB) >= 0;
      if (pinA !== pinB) {
        return pinA ? -1 : 1;
      }
      return 0;
    });
    
    rows.forEach(function (row) {
      tbody.appendChild(row);
    });
  }

  function setLiveState(kind, text) {
    if (!badge || !label || !dot) return;
    var badgeBase = 'inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-full px-3 py-2 text-[11px] font-medium sm:min-h-0 sm:w-auto sm:py-1.5 ';
    if (kind === 'live') {
      badge.className = badgeBase + 'border border-emerald-500/20 bg-emerald-500/10 text-emerald-300';
      dot.className = 'inline-flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse';
    } else if (kind === 'error') {
      badge.className = badgeBase + 'border border-rose-500/20 bg-rose-500/10 text-rose-300';
      dot.className = 'inline-flex h-2 w-2 rounded-full bg-rose-400';
    } else {
      badge.className = badgeBase + 'border border-amber-500/20 bg-amber-500/10 text-amber-300';
      dot.className = 'inline-flex h-2 w-2 rounded-full bg-amber-400 animate-pulse';
    }
    label.textContent = text;
  }

  function renderRows(rows) {
    if (!rows || !rows.length) {
      return '<tr><td colspan="6" class="px-4 py-10 text-center text-sm text-muted-foreground">No containers found on this Docker engine.</td></tr>';
    }
    var pinned = getPinned();
    
    var sortedRows = rows.slice().sort(function (a, b) {
      var pinA = pinned.indexOf(a.Name) >= 0;
      var pinB = pinned.indexOf(b.Name) >= 0;
      if (pinA !== pinB) {
        return pinA ? -1 : 1;
      }
      if (a.State === b.State) {
        if (a.CPUPercent === b.CPUPercent) {
          return a.Name < b.Name ? -1 : 1;
        }
        return b.CPUPercent - a.CPUPercent;
      }
      if (a.State === 'running') return -1;
      if (b.State === 'running') return 1;
      return a.Name < b.Name ? -1 : 1;
    });

    return sortedRows.map(function (row) {
      var isPinned = pinned.indexOf(row.Name) >= 0;
      var stateDot = 'bg-slate-500';
      if (row.State === 'running') stateDot = 'bg-emerald-400';
      else if (row.State === 'exited') stateDot = 'bg-amber-400';
      
      var pinClass = isPinned ? 'text-primary rotate-45 shrink-0 transform transition-transform pin-icon' : 'text-muted-foreground/30 hover:text-primary hover:scale-110 shrink-0 transform transition-all pin-icon';
      var pinFill = isPinned ? 'currentColor' : 'none';

      return '' +
        '<tr class="bg-background/30 align-top container-row" data-name="' + escHtml(row.Name) + '">' +
          '<td class="px-4 py-3">' +
            '<div class="flex items-start justify-between gap-2">' +
              '<div class="flex items-start gap-3 min-w-0">' +
                '<span class="mt-1.5 inline-flex h-2.5 w-2.5 shrink-0 rounded-full ' + stateDot + '"></span>' +
                '<div class="min-w-0 max-w-full sm:max-w-md">' +
                  '<p class="font-mono text-[13px] font-semibold text-foreground truncate">' + escHtml(row.Name) + '</p>' +
                  '<p class="mt-0.5 text-xs text-muted-foreground truncate">' + escHtml(row.Image) + '</p>' +
                  '<p class="mt-1 text-[11px] text-muted-foreground">' + escHtml(row.Status) + '</p>' +
                '</div>' +
              '</div>' +
              '<button type="button" class="pin-btn p-1 rounded hover:bg-muted/50 transition-all shrink-0" onclick="togglePin(\'' + escHtml(row.Name) + '\')" title="Pin container to top">' +
                '<svg class="h-3.5 w-3.5 ' + pinClass + '" fill="' + pinFill + '" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">' +
                  '<path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/>' +
                '</svg>' +
              '</button>' +
            '</div>' +
          '</td>' +
          '<td class="px-4 py-3"><p class="font-semibold tabular-nums text-foreground">' + escHtml((row.CPUPercent || 0).toFixed(1)) + '%</p></td>' +
          '<td class="px-4 py-3">' +
            '<p class="font-semibold tabular-nums text-foreground">' + escHtml(row.MemUsageHuman || '—') + '</p>' +
            '<p class="mt-0.5 text-[11px] text-muted-foreground">' + escHtml((row.MemPercent || 0).toFixed(1)) + '% of ' + escHtml(row.MemLimitHuman || '—') + '</p>' +
          '</td>' +
          '<td class="px-4 py-3 text-[11px] text-muted-foreground">' +
            '<p>RX ' + escHtml(row.NetInputHuman || '0 B') + '</p>' +
            '<p>TX ' + escHtml(row.NetOutputHuman || '0 B') + '</p>' +
          '</td>' +
          '<td class="px-4 py-3 text-[11px] text-muted-foreground">' +
            '<p>Read ' + escHtml(row.BlockReadHuman || '0 B') + '</p>' +
            '<p>Write ' + escHtml(row.BlockWriteHuman || '0 B') + '</p>' +
          '</td>' +
          '<td class="px-4 py-3"><p class="font-semibold tabular-nums text-foreground">' + escHtml(String(row.Pids || 0)) + '</p></td>' +
        '</tr>';
    }).join('');
  }

  function renderMonitor(data) {
    lastPayload = data;
    var sys = data.sys || {};
    if (data.dockerError) {
      root.innerHTML = '<div class="rounded-xl border border-rose-500/25 bg-rose-500/10 px-4 py-3 text-sm text-rose-300">' + escHtml(data.dockerError) + '</div>';
      return;
    }

    var totalAllocatedMemoryGB = data.totalAllocatedMemoryGB || 0;
    var totalAllocatedCPUs = data.totalAllocatedCPUs || 0;
    var memoryAllocatedPct = data.memoryAllocatedPct || 0;
    var cpuAllocatedPct = data.cpuAllocatedPct || 0;

    var memBarClass = 'bg-blue-500';
    if (memoryAllocatedPct > 100) memBarClass = 'bg-rose-500';
    else if (memoryAllocatedPct > 80) memBarClass = 'bg-amber-500';

    var cpuBarClass = 'bg-orange-500';
    if (cpuAllocatedPct > 100) cpuBarClass = 'bg-rose-500';
    else if (cpuAllocatedPct > 80) cpuBarClass = 'bg-amber-500';

    root.innerHTML = '' +
      '<div class="space-y-5">' +
        '<div class="grid gap-4 md:grid-cols-3">' +
          '<div class="panel-card p-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div><p class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">Host CPU</p><p class="mt-1.5 text-2xl font-bold tabular-nums text-foreground">' + escHtml(((sys.CPUPercent || 0).toFixed ? (sys.CPUPercent || 0).toFixed(0) : '0')) + '%</p><p class="mt-1 text-xs text-muted-foreground">' + escHtml(String(sys.NumCPU || 0)) + ' logical CPUs visible to panel</p></div>' +
              '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-500/10 ring-1 ring-emerald-500/20"><svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.5h3.75l1.5-6 3 12 2.25-9 1.5 3H21"/></svg></div>' +
            '</div>' +
            '<div class="mt-4 h-2 overflow-hidden rounded-full bg-muted/40"><div class="h-full rounded-full bg-gradient-to-r from-emerald-500 to-lime-400" style="width: ' + escHtml(String(Math.max(0, Math.min(100, sys.CPUPercent || 0)))) + '%"></div></div>' +
          '</div>' +
          '<div class="panel-card p-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div><p class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">Host Memory</p><p class="mt-1.5 text-2xl font-bold tabular-nums text-foreground">' + escHtml(((sys.MemUsedGB || 0).toFixed ? (sys.MemUsedGB || 0).toFixed(1) : '0.0')) + ' GB</p><p class="mt-1 text-xs text-muted-foreground">of ' + escHtml(((sys.MemTotalGB || 0).toFixed ? (sys.MemTotalGB || 0).toFixed(1) : '0.0')) + ' GB</p></div>' +
              '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-stone-500/10 ring-1 ring-stone-500/20"><svg class="h-5 w-5 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h12v4H6V6zm0 6h12v4H6v-4z"/></svg></div>' +
            '</div>' +
            '<div class="mt-4 h-2 overflow-hidden rounded-full bg-muted/40"><div class="h-full rounded-full bg-gradient-to-r from-orange-500 to-amber-400" style="width: ' + escHtml(String(Math.max(0, Math.min(100, sys.MemUsedPct || 0)))) + '%"></div></div>' +
          '</div>' +
          '<div class="panel-card p-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div><p class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">Visible Runtime</p><p class="mt-1.5 text-sm font-semibold text-foreground">' + escHtml(sys.GoVersion || '') + '</p><p class="mt-1 text-xs text-muted-foreground">' + escHtml(sys.HostNote || '') + '</p></div>' +
              '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-orange-500/10 ring-1 ring-orange-500/20"><svg class="h-5 w-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m5-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="grid gap-4 md:grid-cols-2">' +
          '<div class="panel-card p-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div><p class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">Allocated RAM (User Limits)</p><p class="mt-1.5 text-2xl font-bold tabular-nums text-foreground">' + escHtml(totalAllocatedMemoryGB.toFixed(1)) + '<span class="text-sm font-normal text-muted-foreground"> GB</span></p><p class="mt-1 text-xs text-muted-foreground">of ' + escHtml((sys.MemTotalGB || 0).toFixed(1)) + ' GB Host Capacity</p></div>' +
              '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-500/10 ring-1 ring-blue-500/20"><svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25" /></svg></div>' +
            '</div>' +
            '<div class="mt-4 h-2 overflow-hidden rounded-full bg-muted/40"><div class="h-full rounded-full ' + memBarClass + '" style="width: ' + escHtml(String(Math.min(100, memoryAllocatedPct))) + '%"></div></div>' +
            '<p class="mt-1.5 text-[10px] text-muted-foreground text-right font-medium">' + escHtml(memoryAllocatedPct.toFixed(0)) + '% Allocated</p>' +
          '</div>' +
          '<div class="panel-card p-4">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div><p class="text-[10px] font-semibold uppercase tracking-widest text-muted-foreground">Allocated CPU Cores (User Limits)</p><p class="mt-1.5 text-2xl font-bold tabular-nums text-foreground">' + escHtml(totalAllocatedCPUs.toFixed(1)) + '<span class="text-sm font-normal text-muted-foreground"> Cores</span></p><p class="mt-1 text-xs text-muted-foreground">of ' + escHtml(String(sys.NumCPU || 0)) + ' Host Cores</p></div>' +
              '<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-orange-500/10 ring-1 ring-orange-500/20"><svg class="h-5 w-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21M6.75 6.75l.75.75m9-3l-.75.75m-9 12l.75-.75m9 3l-.75-.75" /></svg></div>' +
            '</div>' +
            '<div class="mt-4 h-2 overflow-hidden rounded-full bg-muted/40"><div class="h-full rounded-full ' + cpuBarClass + '" style="width: ' + escHtml(String(Math.min(100, cpuAllocatedPct))) + '%"></div></div>' +
            '<p class="mt-1.5 text-[10px] text-muted-foreground text-right font-medium">' + escHtml(cpuAllocatedPct.toFixed(0)) + '% Allocated</p>' +
          '</div>' +
        '</div>' +
        '<div class="panel-card overflow-hidden">' +
          '<div class="flex flex-col gap-2 border-b border-border/50 px-4 py-3 sm:flex-row sm:items-center sm:justify-between">' +
            '<div><h3 class="text-sm font-semibold text-foreground">Container Usage</h3><p class="text-xs text-muted-foreground">Live WebSocket stream. Updates stop as soon as you leave this page.</p></div>' +
            '<div class="text-[11px] text-muted-foreground">Updated ' + escHtml(data.updatedAt || '') + '</div>' +
          '</div>' +
          '<div class="overflow-x-auto">' +
            '<table class="min-w-full text-sm">' +
              '<thead class="bg-muted/20 text-left text-[11px] uppercase tracking-wide text-muted-foreground"><tr><th class="px-4 py-3 font-medium">Container</th><th class="px-4 py-3 font-medium">CPU</th><th class="px-4 py-3 font-medium">Memory</th><th class="px-4 py-3 font-medium">Network</th><th class="px-4 py-3 font-medium">Block I/O</th><th class="px-4 py-3 font-medium">PIDs</th></tr></thead>' +
              '<tbody class="divide-y divide-border/40">' + renderRows(data.usageRows || []) + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function closeSocket() {
    if (retryTimer) {
      clearTimeout(retryTimer);
      retryTimer = 0;
    }
    if (ws) {
      try { ws.close(); } catch (e) {}
      ws = null;
    }
  }

  function connect() {
    closeSocket();
    setLiveState('connecting', 'Connecting live stream…');
    var proto = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    ws = new WebSocket(proto + window.location.host + '/monitor/ws');
    ws.onopen = function () {
      setLiveState('live', 'Live WebSocket stream');
    };
    ws.onmessage = function (event) {
      try {
        renderMonitor(JSON.parse(event.data));
      } catch (e) {
        setLiveState('error', 'Invalid monitor payload');
      }
    };
    ws.onerror = function () {
      setLiveState('error', 'Monitor stream error');
    };
    ws.onclose = function () {
      ws = null;
      if (!shouldReconnect) {
        setLiveState('error', 'Monitor stopped');
        return;
      }
      setLiveState('connecting', 'Reconnecting…');
      retryTimer = setTimeout(connect, 1500);
    };
  }

  window.__monitorReconnect = function () {
    shouldReconnect = true;
    connect();
  };

  window.addEventListener('beforeunload', function () {
    shouldReconnect = false;
    closeSocket();
  });

  // Initial sort on page load for SSR rows
  triggerSort();
  connect();
})();
</script>
