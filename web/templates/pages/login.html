{{/* Auth: sign-in form (no shell nav until session). */}}
<div class="panel-card p-6 space-y-5">
  <div>
    <h2 class="text-lg font-bold text-foreground">Sign in</h2>
    <p class="mt-1 text-sm text-muted-foreground">Enter your credentials to access the panel.</p>
  </div>

  {{if .Error}}
  <div class="flex items-start gap-2.5 rounded-lg border border-rose-500/30 bg-rose-500/10 px-3.5 py-3">
    <svg class="mt-0.5 h-4 w-4 shrink-0 text-rose-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    <p class="text-sm text-rose-300">{{.Error}}</p>
  </div>
  {{end}}

  <form method="post" action="/login" class="space-y-4">
    <input type="hidden" name="next" value="{{.Next}}">
    <div>
      <label class="mb-1.5 block text-sm font-medium text-foreground" for="username">Username</label>
      <input id="username" name="username" type="text" class="input w-full" placeholder="admin" required autocomplete="username">
    </div>
    <div>
      <label class="mb-1.5 block text-sm font-medium text-foreground" for="password">Password</label>
      <input id="password" name="password" type="password" class="input w-full" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-primary w-full py-2.5 text-sm">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
      </svg>
      Sign in
    </button>
  </form>
</div>
