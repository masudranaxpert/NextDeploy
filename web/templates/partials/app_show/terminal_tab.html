    <div class="panel-card space-y-4 p-5">
      <div>
        <h2 class="text-base font-semibold text-foreground">Terminal</h2>
      </div>
      {{if not .HasStack}}
        <div class="flex items-start gap-3 rounded-xl border border-amber-500/25 bg-amber-500/10 px-4 py-3">
          <svg class="mt-0.5 h-4 w-4 shrink-0 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
          <p class="text-sm text-amber-200">Add a <code class="rounded bg-muted px-1">Dockerfile</code> or <code class="rounded bg-muted px-1">docker-compose.yml</code> and deploy from Overview first.</p>
        </div>
      {{else}}
        <div class="flex flex-wrap items-end gap-3">
          <div id="term-pick-wrap" class="min-w-[280px] flex-1 max-w-xl"
               hx-get="/apps/{{.ID}}/partials/terminal-containers"
               hx-trigger="load"
               hx-swap="innerHTML">
            <label class="mb-1 block text-xs font-medium text-muted-foreground" for="term-pick">Container</label>
            <div class="input flex min-h-[2.5rem] w-full items-center gap-2 text-sm text-muted-foreground">
              <svg class="h-4 w-4 shrink-0 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
              Loading containers…
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="term-status-dot" class="inline-block h-2 w-2 rounded-full bg-muted-foreground/40"></span>
          <p id="term-status" class="text-xs text-muted-foreground" aria-live="polite"></p>
        </div>
        <div class="overflow-hidden rounded-xl border border-border bg-[#0a0a0a] shadow-inner">
          <div class="flex items-center gap-2 border-b border-border/50 bg-muted/20 px-4 py-2">
            <div class="flex gap-1.5">
              <span class="h-3 w-3 rounded-full bg-red-500/60"></span>
              <span class="h-3 w-3 rounded-full bg-amber-500/60"></span>
              <span class="h-3 w-3 rounded-full bg-emerald-500/60"></span>
            </div>
            <span class="text-xs font-mono text-muted-foreground/60">terminal</span>
          </div>
          <div id="xterm-host" class="h-[min(30rem,58vh)] w-full min-h-[200px] p-1" data-app-id="{{.ID}}"></div>
        </div>
      {{end}}
    </div>
