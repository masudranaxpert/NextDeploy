  <!-- App header -->
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0">
      <a href="/apps" class="inline-flex items-center gap-1.5 text-xs font-medium text-muted-foreground hover:text-primary transition-colors">
        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
        All Apps
      </a>
      <div class="mt-2 flex items-center gap-3">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-primary/12 ring-1 ring-primary/25 text-sm font-bold text-primary uppercase">
          {{initials .App.Name}}
        </div>
        <div class="min-w-0">
          <h1 class="truncate text-xl font-bold tracking-tight text-foreground sm:text-2xl">{{.App.Name}}</h1>
          <p class="mt-0.5 font-mono text-[10px] text-muted-foreground sm:text-xs">{{.App.ID}}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab strip -->
  <div class="app-tab-strip flex w-full gap-1 overflow-x-auto overscroll-x-contain border-b border-border/60 pb-2 sm:flex-wrap sm:overflow-visible sm:border-0 sm:px-1 sm:pb-px md:pb-0">
    <a href="/apps/{{.App.ID}}?tab=overview"
       class="app-tab {{if eq .Tab "overview"}}app-tab-active{{else}}app-tab-inactive{{end}}"
       hx-get="/apps/{{.App.ID}}?tab=overview&amp;partial=tab"
       hx-target="#app-tab-panel"
       hx-indicator="#global-htmx-indicator"
       hx-swap="innerHTML"
       hx-push-url="/apps/{{.App.ID}}?tab=overview">
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
      Overview
    </a>

       class="app-tab {{if eq .Tab "deployment"}}app-tab-active{{else}}app-tab-inactive{{end}}"
       hx-get="/apps/{{.App.ID}}?tab=deployment&amp;partial=tab"
       hx-target="#app-tab-panel"
       hx-indicator="#global-htmx-indicator"
       hx-swap="innerHTML"
       hx-push-url="/apps/{{.App.ID}}?tab=deployment">
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>

      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
