<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal-box max-w-4xl w-full" onclick="event.stopPropagation()">
    <div class="mb-4 flex items-center justify-between gap-3">
      <div>
        <h3 class="text-base font-semibold text-foreground">Compose Preview</h3>
        <p class="mt-0.5 text-xs text-muted-foreground">Merged compose file generated by NextDeploy from your base compose and domain routing settings.</p>
      </div>
      <button type="button" class="text-muted-foreground hover:text-foreground transition-colors"
              onclick="this.closest('.modal-overlay').remove()">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <pre class="max-h-[70vh] overflow-auto rounded-xl border border-stone-700/50 bg-stone-950 p-4 font-mono text-[11px] leading-relaxed whitespace-pre-wrap break-all {{if .ComposeError}}text-rose-300{{else}}text-stone-300/85{{end}}">{{.ComposePreview}}</pre>
    <div class="mt-4 flex justify-end">
      <button type="button" class="btn text-xs" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>
  </div>
</div>
