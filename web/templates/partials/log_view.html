<div class="log-view-wrap space-y-3">

  <!-- Toolbar -->
  <div class="flex flex-wrap items-center justify-between gap-2">
    {{if .LogMeta}}
      <p class="text-xs text-primary/85 font-mono bg-primary/10 px-2 py-1 rounded-md border border-primary/25">{{.LogMeta}}</p>
    {{else}}
      <div></div>
    {{end}}

    <div class="flex flex-wrap items-center gap-2">
      <!-- Log level filter buttons -->
      <div class="log-filter-bar flex items-center gap-1 rounded-lg border border-border bg-muted/30 p-1">
        <button type="button" data-filter="all"
          class="log-filter-btn log-filter-active bg-primary/12 text-primary rounded-md px-2.5 py-1 text-[11px] font-medium transition-all">
          All
        </button>
        <button type="button" data-filter="error"
          class="log-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium transition-all text-muted-foreground hover:text-rose-300 hover:bg-rose-950/30">
          Error
        </button>
        <button type="button" data-filter="warn"
          class="log-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium transition-all text-muted-foreground hover:text-amber-300 hover:bg-amber-950/30">
          Warn
        </button>
        <button type="button" data-filter="info"
          class="log-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium transition-all text-muted-foreground hover:text-primary/90 hover:bg-primary/12">
          Info
        </button>
        <button type="button" data-filter="debug"
          class="log-filter-btn rounded-md px-2.5 py-1 text-[11px] font-medium transition-all text-muted-foreground hover:text-orange-300 hover:bg-orange-950/30">
          Debug
        </button>
      </div>

      <!-- Timestamp toggle -->
      <button type="button" class="log-ts-toggle inline-flex items-center gap-1.5 rounded-lg bg-muted/40 px-2.5 py-1.5 text-[11px] font-medium text-muted-foreground ring-1 ring-border transition-all hover:text-foreground">
        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="log-ts-label">Show TS</span>
      </button>

      <!-- Download log button -->
      {{if .LogHTML}}
        <button type="button" class="log-download-btn inline-flex items-center gap-1.5 rounded-lg bg-emerald-600/20 px-2.5 py-1.5 text-[11px] font-medium text-emerald-300 ring-1 ring-emerald-500/30 transition-all hover:bg-emerald-600/30 hover:text-emerald-200">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download
        </button>
      {{end}}
    </div>
  </div>

  <!-- Log viewport -->
  {{if .LogHTML}}
    <div class="log-viewport hide-timestamps max-h-[min(40rem,75vh)] overflow-auto rounded-xl border border-slate-700/50 bg-[#060a10] p-4 font-mono text-lg leading-relaxed shadow-inner ring-1 ring-black/40">
      {{.LogHTML}}
    </div>
  {{else}}
    <div class="log-viewport hide-timestamps max-h-[min(40rem,75vh)] overflow-auto rounded-xl border border-slate-700/50 bg-[#060a10] p-4 font-mono text-lg leading-relaxed shadow-inner ring-1 ring-black/40">
      <div class="log-empty-state flex flex-col items-center justify-center py-12 text-center">
        <svg class="mb-3 h-10 w-10 text-slate-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <p class="text-sm text-slate-500">No log output yet</p>
        <p class="mt-1 text-xs text-slate-600">Container may not have written to stdout/stderr yet</p>
      </div>
    </div>
  {{end}}
</div>
