{{if and .HasGitConfig .GitDeployShort}}
<div class="w-full rounded-lg border border-border/60 bg-muted/20 px-3 py-3 sm:px-4">
  <p class="text-[10px] font-semibold uppercase tracking-wider text-muted-foreground">Deployed commit</p>
  <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-2">
    {{if .GitDeployURL}}
    <a href="{{.GitDeployURL}}" target="_blank" rel="noopener noreferrer"
       class="inline-flex min-w-0 max-w-full items-center gap-1.5 rounded font-mono text-sm font-semibold text-primary hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background">
      <svg class="h-3.5 w-3.5 shrink-0 opacity-80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.649l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      <span class="truncate">{{.GitDeployShort}}</span>
    </a>
    {{else}}
    <span class="font-mono text-sm font-semibold text-foreground">{{.GitDeployShort}}</span>
    {{end}}
    <span class="hidden h-4 w-px shrink-0 bg-border/70 sm:block" aria-hidden="true"></span>
    <span class="inline-flex flex-wrap items-center gap-1.5 text-xs text-muted-foreground">
      <span class="text-[10px] font-medium uppercase tracking-wide text-muted-foreground/75">Branch</span>
      <span class="rounded-md border border-border/50 bg-background/70 px-2 py-0.5 font-mono text-[11px] font-medium text-foreground/90">{{.GitConfig.Branch}}</span>
    </span>
  </div>
  {{if .GitDeploySubject}}
  <p class="mt-2.5 text-xs leading-relaxed text-muted-foreground line-clamp-2" title="{{.GitDeploySubject}}">{{.GitDeploySubject}}</p>
  {{end}}
</div>
{{end}}
