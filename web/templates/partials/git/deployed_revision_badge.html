{{if and .HasGitConfig .GitDeployShort}}
<div class="mt-3 rounded-xl border border-primary/20 bg-primary/5 px-3 py-2.5 sm:px-4">
  <p class="text-[10px] font-semibold uppercase tracking-wide text-primary/80">Last synced revision</p>
  <div class="mt-1.5 flex flex-wrap items-baseline gap-x-2 gap-y-1">
    {{if .GitDeployURL}}
    <a href="{{.GitDeployURL}}" target="_blank" rel="noopener noreferrer"
       class="inline-flex items-center gap-1 font-mono text-sm font-semibold text-primary hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background rounded">
      <svg class="h-3.5 w-3.5 shrink-0 opacity-80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.649l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      {{.GitDeployShort}}
    </a>
    {{else}}
    <span class="font-mono text-sm font-semibold text-foreground">{{.GitDeployShort}}</span>
    {{end}}
    <span class="text-xs text-muted-foreground">on branch <span class="font-medium text-foreground/90">{{.GitConfig.Branch}}</span></span>
  </div>
  {{if .GitDeploySubject}}
  <p class="mt-2 max-h-10 overflow-hidden text-xs leading-snug text-muted-foreground" title="{{.GitDeploySubject}}">{{.GitDeploySubject}}</p>
  {{end}}
</div>
{{end}}
