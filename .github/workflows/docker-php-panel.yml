# Build and push the PHP Panel branch image to Docker Hub (php-panel branch only).
# Tags:
#   :php-panel
#   :php-panel-<full-sha>
# Publishes a rolling GitHub pre-release for PHP Panel builds.
name: Docker (php-panel)

on:
  push:
    branches:
      - php-panel
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextdeploy

jobs:
  build-push:
    name: Build & push php-panel image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:php-panel
            ${{ env.IMAGE_NAME }}:php-panel-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=NextDeploy (PHP Panel)
            org.opencontainers.image.description=NextDeploy panel with PHP Panel template (php-panel branch)
            org.opencontainers.image.url=https://github.com/masudranaxpert/NextDeploy
            org.opencontainers.image.source=https://github.com/masudranaxpert/NextDeploy/tree/php-panel
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-old-sha-tags:
    name: Prune old php-panel-<sha> Docker Hub tags
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Keep 10 newest php-panel-<full-sha>, delete older
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          IMAGE: nextdeploy
          KEEP: "10"
          TAG_REGEX: '^php-panel-[0-9a-f]{40}$'
        run: |
          set -euo pipefail
          TOKEN=$(curl -s -X POST \
            "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKER_USERNAME}\",\"password\":\"${DOCKER_TOKEN}\"}" \
            | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::warning::Docker Hub login failed — skip tag prune."
            exit 0
          fi
          LIST=$(mktemp)
          URL="https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${IMAGE}/tags?page_size=100&ordering=last_updated"
          while [ -n "$URL" ]; do
            RESP=$(curl -sS -H "Authorization: Bearer ${TOKEN}" "$URL")
            echo "$RESP" | jq -r '.results[].name' >> "$LIST"
            URL=$(echo "$RESP" | jq -r 'if .next == null then empty else .next end')
          done
          SHA_TAGS=$(grep -E "${TAG_REGEX}" "$LIST" || true)
          rm -f "$LIST"
          TO_DELETE=$(echo "$SHA_TAGS" | tail -n +$((KEEP + 1)) || true)
          if [ -z "$TO_DELETE" ]; then
            echo "No old php-panel-<sha> tags to delete (≤${KEEP} kept)."
            exit 0
          fi
          echo "Deleting old php-panel-<sha> tags:"
          echo "$TO_DELETE"
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${IMAGE}/tags/${TAG}/" \
              -H "Authorization: Bearer ${TOKEN}")
            echo "  $TAG → HTTP $HTTP"
          done <<< "$TO_DELETE"
          echo "Prune complete."

  github-release:
    name: Rolling GitHub pre-release (PHP Panel)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or refresh php-panel release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          TAG="php-panel-release"
          NOTES_FILE="$(mktemp)"
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nextdeploy"
          {
            echo "## Docker Hub"
            echo ""
            echo "**Rolling tag (recommended)**"
            echo '```bash'
            echo "docker pull ${IMAGE}:php-panel"
            echo '```'
            echo ""
            echo "**Immutable tag (this build)**"
            echo '```bash'
            echo "docker pull ${IMAGE}:php-panel-${{ github.sha }}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            --repo "$REPO" \
            --target "${{ github.sha }}" \
            --title "NextDeploy PHP Panel (latest build)" \
            --notes-file "$NOTES_FILE" \
            --prerelease

          rm -f "$NOTES_FILE"
