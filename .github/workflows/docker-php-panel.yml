# Build and push the PHP Panel branch image to Docker Hub (php-panel branch only).
# Tags:
#   :php-panel
#   :php-panel-<full-sha>
# Publishes a rolling GitHub pre-release for PHP Panel builds.
name: Docker (php-panel)

on:
  push:
    branches:
      - php-panel
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextdeploy

jobs:
  build-push:
    name: Build & push php-panel image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:php-panel
            ${{ env.IMAGE_NAME }}:php-panel-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=NextDeploy (PHP Panel)
            org.opencontainers.image.description=NextDeploy panel with PHP Panel template (php-panel branch)
            org.opencontainers.image.url=https://github.com/masudranaxpert/NextDeploy
            org.opencontainers.image.source=https://github.com/masudranaxpert/NextDeploy/tree/php-panel
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Rolling GitHub pre-release (PHP Panel)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or refresh php-panel release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          TAG="php-panel-release"
          NOTES_FILE="$(mktemp)"
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nextdeploy"
          {
            echo "## Docker Hub"
            echo ""
            echo "**Rolling tag (recommended)**"
            echo '```bash'
            echo "docker pull ${IMAGE}:php-panel"
            echo '```'
            echo ""
            echo "**Immutable tag (this build)**"
            echo '```bash'
            echo "docker pull ${IMAGE}:php-panel-${{ github.sha }}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$NOTES_FILE"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            --repo "$REPO" \
            --target "${{ github.sha }}" \
            --title "NextDeploy PHP Panel (latest build)" \
            --notes-file "$NOTES_FILE" \
            --prerelease

          rm -f "$NOTES_FILE"
