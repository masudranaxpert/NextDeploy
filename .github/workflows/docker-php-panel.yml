# Build and push the PHP Panel branch image to Docker Hub.
# Tags: :php-panel (rolling) and :php-panel-<full-sha> (immutable pointer).
# Does not push :latest — that stays reserved for version tags on main (release.yml).
name: Docker (php-panel)

on:
  push:
    branches:
      - php-panel
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextdeploy

jobs:
  build-push:
    name: Build & push php-panel image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:php-panel
            ${{ env.IMAGE_NAME }}:php-panel-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=NextDeploy (PHP Panel)
            org.opencontainers.image.description=NextDeploy panel with PHP Panel template (php-panel branch)
            org.opencontainers.image.url=https://github.com/masudranaxpert/NextDeploy
            org.opencontainers.image.source=https://github.com/masudranaxpert/NextDeploy/tree/php-panel
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
