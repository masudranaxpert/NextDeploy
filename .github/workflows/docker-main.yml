# Build and push the main-line panel image on every push to main.
# Tags (fixed policy):
#   :latest   — default install / production rolling image for main branch
#
# Versioned release images (v1.2.3, 1.2.3, etc.) are published by release.yml.
name: Docker (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextdeploy

jobs:
  build-push:
    name: Build & push main image (latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=NextDeploy
            org.opencontainers.image.description=NextDeploy panel (main branch — rolling latest)
            org.opencontainers.image.url=https://github.com/masudranaxpert/NextDeploy
            org.opencontainers.image.source=https://github.com/masudranaxpert/NextDeploy/tree/main
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
